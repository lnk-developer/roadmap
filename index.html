<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI UI/UX 전문가 과정 통합 로드맵</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f8;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5c6b7a;
      --line: #d7e0ea;
      --accent: #1f4e79;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      width: min(100%, 1960px);
      margin: 0 auto;
      padding: 24px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .title-group {
      min-width: 0;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .actions {
      display: flex;
      gap: 8px;
      flex: 0 0 auto;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .viewer {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(23, 32, 51, 0.08);
    }

    .roadmap {
      display: block;
      width: 100%;
      height: auto;
      min-width: 960px;
    }

    .hint {
      margin: 12px 0 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .page {
        padding: 14px;
      }

      .toolbar {
        align-items: stretch;
        flex-direction: column;
      }

      .actions {
        width: 100%;
      }

      .button {
        flex: 1 1 0;
      }

      .viewer {
        border-radius: 8px;
      }

      .roadmap {
        min-width: 720px;
      }
    }

    @media print {
      body {
        background: #ffffff;
      }

      .page {
        width: 100%;
        padding: 0;
      }

      .toolbar,
      .hint {
        display: none;
      }

      .viewer {
        overflow: visible;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .roadmap {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="toolbar" aria-label="로드맵 보기 도구">
      <div class="title-group">
        <h1>AI UI/UX 전문가 과정 통합 로드맵</h1>
        <p class="subtitle">760시간 / 95일 / 19주 과정 운영안</p>
      </div>
      <nav class="actions" aria-label="파일 작업">
        <a class="button" href="./ai_uiux_training_roadmap_project_integrated.svg" download>SVG 다운로드</a>
        <button class="button primary" type="button" onclick="window.print()">인쇄/PDF</button>
      </nav>
    </header>

    <section class="viewer" aria-label="로드맵 이미지">
      <img
        class="roadmap"
        src="./ai_uiux_training_roadmap_project_integrated.svg"
        alt="AI UI/UX 전문가 과정 760시간 통합 로드맵">
    </section>

    <p class="hint">작은 화면에서는 좌우로 이동하며 볼 수 있습니다. 인쇄/PDF 버튼을 누르면 현재 로드맵을 PDF로 저장할 수 있습니다.</p>
  </main>
</body>
</html>
