<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI UI/UX 전문가 과정 통합 로드맵</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3f8;
      --panel: #ffffff;
      --text: #172033;
      --muted: #5c6b7a;
      --line: #d7e0ea;
      --accent: #1f4e79;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    .page {
      width: min(100%, 1960px);
      margin: 0 auto;
      padding: 24px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(20px, 2.4vw, 30px);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 38px;
      padding: 0 14px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }

    .viewer {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 12px 28px rgba(23, 32, 51, 0.08);
    }

    .roadmap-svg {
      display: block;
      width: 100%;
      min-width: 960px;
      height: auto;
    }

    .hint {
      margin: 12px 0 0;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .page { padding: 14px; }
      .toolbar { align-items: stretch; flex-direction: column; }
      .button { width: 100%; }
      .viewer { border-radius: 8px; }
      .roadmap-svg { min-width: 720px; }
    }

    @media print {
      body { background: #ffffff; }
      .page { width: 100%; padding: 0; }
      .toolbar, .hint { display: none; }
      .viewer { overflow: visible; border: 0; border-radius: 0; box-shadow: none; }
      .roadmap-svg { width: 100%; min-width: 0; }
    }
  </style>
</head>
