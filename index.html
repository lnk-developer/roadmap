<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI UI/UX Training Roadmap</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        background: #f5f7fa;
        font-family: Pretendard, "Noto Sans KR", Arial, sans-serif;
    }

    .container {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 24px;
    }

    .svg-wrapper {
        width: 100%;
        max-width: 1900px;
        background: #fff;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 8px 30px rgba(0,0,0,.08);
    }

    .svg-wrapper object,
    .svg-wrapper img {
        display: block;
        width: 100%;
        height: auto;
    }

    @media (max-width:768px){
        .container{
            padding:12px;
        }

        .svg-wrapper{
            border-radius:12px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <div class="svg-wrapper">
        <object
            data="ai_uiux_training_roadmap_project_integrated.svg"
            type="image/svg+xml">
            <img
                src="ai_uiux_training_roadmap_project_integrated.svg"
                alt="AI UI/UX Training Roadmap">
        </object>
    </div>
</div>

</body>
</html>
